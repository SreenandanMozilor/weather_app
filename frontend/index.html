<!DOCTYPE html>
<html lang = "en" >

<head>
    <title>Weather App</title>
    <meta charset="UTF-8" name = "viewport" content = "width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav>

        </nav>
        <h1>Skywatcher</h1>
        <div class = "search-container">
            <input type = "text" id = "city-name" placeholder = "Search City" >
            <button id = "add-city-button">Add City</button>
            <div id = "search-history" class = "hidden-dropdown">

            </div>
        </div>
        <div class = "toggle-container">
            <button class = "unit-toggle"> &deg;C / &deg;F </button>
        </div>
    </header>

    <main id = "weather-grid">

    </main>

    <template id = "skeleton">
        <div class = "skeleton card">
            <div class = "shimmer">

            </div>
        </div>
    </template>

</body>
